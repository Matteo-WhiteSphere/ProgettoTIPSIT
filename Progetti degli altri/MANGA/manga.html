<head>
<title>Avventura</title>
<style>
body {
margin: 0;
background-color: #111111;
display: flex;
align-items: center;
justify-content: center;
height: 100vh;
color: #ffffff;
font-family: sans-serif;
}
#libro {
position: relative;
display: flex;
align-items: center;
}
#libro img {
width: 400px;
height: 600px;
border-radius: 8px;
margin: 0 5px;
}
.freccia {
font-size: 40px;
cursor: pointer;
padding: 10px;
}
#pulsanteimpostazioni {
position: absolute;
top: 10px;
right: 10px;
cursor: pointer;
font-size: 24px;
}
#divimpostazioni {
position: absolute;
top: 50px;
right: 10px;
background-color: #222222;
padding: 15px;
border-radius: 8px;
display: none;
gap: 10px;
}
#divimpostazioni input {
width: 60px;
padding: 3px;
}
#divimpostazioni label {
display: flex;
align-items: center;
margin: 0 5px;
}
#pulsantehome {
position: absolute;
top: 10px;
right: 60px;
background: #333333;
padding: 5px 10px;
border-radius: 5px;
font-weight: bold;
cursor: pointer;
}
#pulsantehome:hover {
background: #555555;
}
.indietro {
color: #ffffff;
text-decoration: none;
}
</style>
</head>
<body>
<div id="libro">
<span class="freccia" onclick="paginaindietro()"><</span>
<img id="pagina_sinistra" src="PAGES/0.jpg">
<img id="pagina_destra" src="PAGES/1.jpg">
<span class="freccia" onclick="paginavanti()">></span>
</div>
<div id="pulsanteimpostazioni" onclick="mostraimpostazioni()">|||</div>
<div id="divimpostazioni">
<label>
<input type="checkbox" id="pagina_singola" onchange="attivasingola()"> Pagina singola
</label>
<label>
Vai a pagina numero: <input type="number" id="pagina_numero" min="1" max="20">
<button onclick="vaipagina()">Vai</button>
</label>
</div>
<div id="pulsantehome">
<a href="index.html" class="indietro">Indietro</a>
</div>
