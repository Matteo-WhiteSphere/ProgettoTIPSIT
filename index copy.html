<html>
    <head>
        <style>
            body {
                background-image: url("img/Libreria.png");
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            h1{
                font-size: 40px;
                color: white;
            }
            .Titolone{
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0 auto;
                background-color: rgba(0,0,0,0.4);
                border: 3px inset black;
                border-radius: 10px;
                width: 73%;
                margin-bottom: 20px;
                height: 80px;
            }
            .Contenitore{

                margin: 0 auto;
                width: 80%;
                height: 810px;
                border-radius: 10px;
                padding: 20px;
                display: flex;
                gap: 20px;
            }
            .libri-sinistra {
                display: flex;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            .libri-destra {
                display: flex;
                flex-direction: column;
                gap: 15px;
                align-items: flex-end;
            }
            .Bottone{
                width: 160px;
                height: 220px;
                border: 3px solid #8B4513;
                border-left: 12px solid #654321;
                outline: 2px solid #D2691E;
                border-radius: 8px;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
                margin-bottom: 10px;
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                box-shadow: 3px 3px 12px rgba(0,0,0,0.4), inset 0 0 3px rgba(0,0,0,0.2);
                transition: transform 0.2s ease;
                position: relative;
            }
            .Bottone::before {
                content: '';
                position: absolute;
                top: 0px;
                left: 1px;
                bottom: 0px;
                width: 2px;
                background-color: #D2691E;
                pointer-events: none;
            }
            .bottone-avventura {
                background-image: url('img/avventura.jpg');
                margin-top: 172px;
                margin-left: 10px;
                margin-bottom: 12px;
            }
            .bottone-manga {
                background-image: url('img/Manga.png');
                margin-left: -140px;
                margin-bottom: 20px;
            }
            .bottone-topolino {
                background-image: url('img/Topolino.png');
                margin-top: -60px;
                margin-right: 15px;
                transform: scale(0.8);
            }
            .bottone-fantascienza {
                background-image: url('img/Fantascienza.jpg');
                margin-right: -80px;
                transform: scale(0.8);
                margin-top: 4px;
            }
            .bottone-thriller {
                background-image: url('img/Thriller.jpg');
                margin-right: 5px;
                transform: scale(0.8);
            }
            .iframe-container {
                border: 5px inset white;
                background-color: rgba(155, 155, 155, 0.2);
                margin: 0 auto;
                position: relative;
                width: 50px;
                height: 635px;
                overflow: hidden;
                border-radius: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                flex: 1;
            }
            #paginaLibro {
                width: 100%;
                height: 100%;
                object-fit: contain;
                display: block;
            }
            .Bottone a{
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
                color: black;
            }
            .scritta{
                margin-top: 45px;
                font-size: 30px;
                font-family: 'Trebuchet MS';
                color: black;
                text-decoration: none;
            }

            .sinistra{
                position: fixed;
                top: 250px;
                left: 15px;
            }
            .destra{
                right: 15px;
                position: fixed;
                top: 250px;
            }
        </style>
    </head>
    <body>
        <div class="Titolone">
            <h1>INDEX</h1>
        </div>

        <div class="Contenitore">
            <div class="libri-sinistra">
                <div class="Bottone bottone-avventura" onclick="caricaImmagine('img/avventura.jpg')">
                </div>
                <div class="Bottone bottone-manga" onclick="caricaImmagine('img/Manga.png')">
                </div>
            </div>
            <div class="iframe-container">
                <img id="paginaLibro" src="" onclick="apriLibro()" style="cursor: pointer;">
                <div id="testoPlaceholder" style="position: absolute; color: white; font-size: 28px; font-family: 'Arial', sans-serif; text-align: center; background-color: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.3); box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-transform: uppercase; letter-spacing: 2px; font-weight: bold;">clicca su una copertina</div>
            </div>
            <div class="libri-destra">
                <div class="Bottone bottone-topolino" onclick="caricaImmagine('img/Topolino.png')">
                </div>
                <div class="Bottone bottone-fantascienza" onclick="caricaImmagine('img/Fantascienza.jpg')">
                </div>
                <div class="Bottone bottone-thriller" onclick="caricaImmagine('img/Thriller.jpg')">
                </div>
            </div>
        </div>
        
        <script>
            function caricaImmagine(src) {
                // Nascondi il testo placeholder
                document.getElementById('testoPlaceholder').style.display = 'none';
                
                // Carica l'immagine
                document.getElementById('paginaLibro').src = src;
            }
            
            function apriLibro() {
                // Controlla quale immagine è caricata e reindirizza alla pagina corretta
                const imgSrc = document.getElementById('paginaLibro').src;
                
                if (imgSrc.includes('Manga.png')) {
                    window.location.href = 'Progetti degli altri/MANGA/manga.html';
                } else if (imgSrc.includes('avventura.jpg')) {
                    window.location.href = 'Progetti degli altri/Gardella/HTML/2pagine.html';
                } else if (imgSrc.includes('giallo.jpg')) {
                    window.location.href = 'giallo.html';
                } else {
                    window.location.href = 'libro.html';
                }
            }
        </script>
    </body>
</html>
