<html>
    <head>
        <style>
            body { /*Modifica stile, aggiunta sfondo.*/
                background-image: url("img/Libreria.png");
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            h1{ /*stile h1, titolo*/
                font-size: 40px;
                color: white;
            }
            .Titolone{ /**/
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0 auto;
                background-color: rgba(0,0,0,0.4);
                border: 3px inset black;
                border-radius: 10px;
                width: 73%;
                margin-bottom: 20px;
                height: 80px;
            }
            .Contenitore{
                border: 5px inset white;
                background-color: rgba(255, 255, 255, 0.2);
                margin: 0 auto;
                width: 70%;
                height: 580px;
                border-radius: 10px;
                padding: 20px;
            }
            iframe{
                width: 100%;
                height: 400px;
                border: 2px solid black;
                border-radius: 10px;
                background-color: white;
            }
            .Riga{
                display: flex;
                justify-content: center;
                gap: 40px;
                margin-top: 30px;
                margin-bottom: 10px;
            }
            .Bottone{
                width: 200px;
                height: 130px;
                background-color: orange;
                border: 2px solid black;
                border-radius: 10px;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
            }
            .Bottone a{
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
                color: black;
            }
            .scritta{
                margin-top: 45px;
                font-size: 30px;
                font-family: 'Trebuchet MS';
                color: black;
                text-decoration: none;
            }
            .Bottone:hover{
                background-color: #4CAF90;
                padding: 10px;
                transition: background-color 1s;
                box-shadow: 10px 10px 20px gray;
            }
            .sinistra{
                position: fixed;
                top: 250px;
                left: 15px;
            }
            .destra{
                right: 15px;
                position: fixed;
                top: 250px;
            }
            iframe{
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div class="Titolone">
            <h1>INDEX</h1>
        </div>
        <img src="img/sinistra.png" width="200px" class="sinistra">
        <img src="img/destra.png" width="200px" class="destra">
        <div class="Contenitore">
            <iframe name="Copertine"></iframe>
            <div class="Riga">
                <div class="Bottone">
                    <a href="img/Topolino.png" target="Copertine">
                        <p class="scritta">Topolino</p>
                    </a>
                </div>
                <div class="Bottone">
                    <a href="img/Fantascienza.jpg" target="Copertine">
                        <p class="scritta">Fantascienza</p>
                    </a>
                </div>
                <div class="Bottone">
                    <a href="img/Thriller.jpg" target="Copertine">
                        <p class="scritta">Thriller</p>
                    </a>
                </div>
                <div class="Bottone">
                    <a href="img/avventura.jpg" target="Copertine">
                        <p class="scritta">Avventura</p>
                    </a>
                </div>
                <div class="Bottone">
                    <a href="img/Manga.png" target="Copertine">
                        <p class="scritta">Manga</p>
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
