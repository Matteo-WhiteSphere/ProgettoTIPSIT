<html>
    <head>
        <style>
            body {
                background-image: url("img/Libreria.png");
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            h1{
                font-size: 40px;
                color: white;
            }
            .Titolone{
                display: flex;
                justify-content: center;
                align-items: center;
                margin: 0 auto;
                background-color: rgba(0,0,0,0.4);
                border: 3px inset black;
                border-radius: 10px;
                width: 73%;
                margin-bottom: 20px;
                height: 80px;
            }
            .Contenitore{
                border: 5px inset white;
                background-color: rgba(255, 255, 255, 0.2);
                margin: 0 auto;
                width: 70%;
                height: 730px;
                border-radius: 10px;
                padding: 20px;
            }
            .iframe-container {
                position: relative;
                width: 100%;
                height: 550px;
                overflow: hidden;
                border-radius: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #paginaLibro {
                width: 100%;
                height: 100%;
                object-fit: contain;
                display: block;
            }
            .Riga{
                display: flex;
                justify-content: center;
                gap: 40px;
                margin-top: 30px;
                margin-bottom: 10px;
            }
            .Bottone{
                width: 200px;
                height: 130px;
                background-color: orange;
                border: 2px solid black;
                border-radius: 10px;
                cursor: pointer;
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
            }
            .Bottone a{
                width: 100%;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                text-decoration: none;
                color: black;
            }
            .scritta{
                margin-top: 45px;
                font-size: 30px;
                font-family: 'Trebuchet MS';
                color: black;
                text-decoration: none;
            }
            .Bottone:hover{
                background-color: #4CAF90;
                padding: 10px;
                transition: background-color 1s;
                box-shadow: 10px 10px 20px gray;
            }
            .sinistra{
                position: fixed;
                top: 250px;
                left: 15px;
            }
            .destra{
                right: 15px;
                position: fixed;
                top: 250px;
            }
        </style>
    </head>
    <body>
        <div class="Titolone">
            <h1>INDEX</h1>
        </div>
        <img src="img/sinistra.png" width="200px" class="sinistra">
        <img src="img/destra.png" width="200px" class="destra">
        <div class="Contenitore">
            <div class="iframe-container">
                <img id="paginaLibro" src="img/Fantascienza.jpg" alt="Immagine del libro">
            </div>
            <div class="Riga">
                <div class="Bottone" onclick="caricaImmagine('img/Topolino.png')">
                    <p class="scritta">Topolino</p>
                </div>
                <div class="Bottone" onclick="caricaImmagine('img/Fantascienza.jpg')">
                    <p class="scritta">Fantascienza</p>
                </div>
                <div class="Bottone" onclick="caricaImmagine('img/Thriller.jpg')">
                    <p class="scritta">Thriller</p>
                </div>
                <div class="Bottone" onclick="caricaImmagine('img/avventura.jpg')">
                    <p class="scritta">Avventura</p>
                </div>
                <div class="Bottone" onclick="caricaImmagine('img/Manga.png')">
                    <p class="scritta">Manga</p>
                </div>
            </div>
        </div>
        <script>
            function caricaImmagine(src) {
                document.getElementById('paginaLibro').src = src;
            }
        </script>
    </body>
</html>
